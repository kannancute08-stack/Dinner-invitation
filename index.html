<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Invitation</title>
    <style>
        :root {
            --bg-color: #fce4ec;
            --envelope-color: #d44d44;
            --envelope-dark: #b13b33;
            --card-white: #ffffff;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* The main container */
        .container {
            position: relative;
            /* Delay the downward move until the flap is open */
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1) 1.5s;
        }

        .container.open {
            transform: translateY(150px); /* Envelope sinks to bottom */
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-dark);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* The Front Pocket */
        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 3;
        }

        .envelope-front::before {
            content: "";
            position: absolute;
            bottom: 0;
            border-top: 100px solid transparent;
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid var(--envelope-color);
            border-left: 150px solid var(--envelope-color);
        }

        /* The Flap - Opens after 2 seconds */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--envelope-dark);
            transform-origin: top;
            z-index: 4;
            /* Transition starts after initial delay */
            transition: transform 0.6s ease-in-out 0.8s;
        }

        .container.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        /* The Card - Comes out slowly after flap opens */
        .card {
            position: absolute;
            top: 5px;
            left: 10px;
            width: 280px;
            height: 180px;
            background: var(--card-white);
            z-index: 1; 
            padding: 25px 20px;
            box-sizing: border-box;
            text-align: center;
            /* Delay: 1.5s total to wait for flap and then move slowly */
            transition: transform 1.5s ease-out 1.5s, height 1.2s ease-out 1.5s, z-index 0s 1.8s;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            visibility: hidden;
        }

        .container.open .card {
            visibility: visible;
            transform: translateY(-320px); /* Rises high above the sinking envelope */
            z-index: 5;
            height: 380px;
        }

        /* Content Styling */
        h2 { color: var(--envelope-dark); margin: 0 0 15px 0; font-size: 24px; text-transform: uppercase; }
        p { margin: 8px 0; font-size: 15px; color: #444; line-height: 1.4; }
        
        .btn-rsvp {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 13px;
            font-family: sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @media (max-width: 400px) {
            .container { transform: scale(0.8); }
            .container.open { transform: scale(0.8) translateY(180px); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="envelope-wrapper">
            <div class="flap"></div>
            
            <div class="card">
                <h2>Dinner Party</h2>
                <p>You're invited to join us for an evening of great food and company!</p>
                <div style="border-top: 2px solid #fce4ec; margin: 15px 0;"></div>
                <p><strong>SATURDAY | APRIL 12</strong></p>
                <p>7:30 PM Onwards</p>
                <p><em>The Secret Garden Bistro</em></p>
                
                <a href="https://wa.me/1234567890?text=I'll%20be%20there!" class="btn-rsvp">
                    RSVP VIA WHATSAPP
                </a>
            </div>

            <div class="envelope-front"></div>
        </div>
    </div>

    <script>
        window.onload = () => {
            // Step 1: Just show the closed envelope first
            // Step 2: Trigger the opening sequence after 2 seconds
            setTimeout(() => {
                document.getElementById('mainContainer').classList.add('open');
            }, 2000);
        };
    </script>
</body>
</html>
