<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Invitation</title>
    <style>
        :root {
            --bg-color: #fce4ec;
            --envelope-color: #d44d44;
            --envelope-dark: #b13b33;
            --card-white: #ffffff;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            /* Delay the sink until after flap opens */
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1) 2s;
            width: 300px;
            height: 200px;
        }

        .container.open {
            transform: translateY(180px); /* Envelope sinks down */
        }

        /* The Envelope Base */
        .envelope-wrapper {
            position: absolute;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-dark);
            z-index: 1;
        }

        /* The Front "Pocket" - This hides the card at the start */
        .envelope-front {
            position: absolute;
            width: 0;
            height: 0;
            border-top: 100px solid transparent;
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid var(--envelope-color);
            border-left: 150px solid var(--envelope-color);
            z-index: 4; /* Keeps card behind it initially */
            bottom: 0;
        }

        /* The Flap */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--envelope-dark);
            transform-origin: top;
            z-index: 5;
            transition: transform 0.8s ease-in-out 1s; /* Opens after 1s */
        }

        .container.open .flap {
            transform: rotateX(180deg);
            z-index: 0; /* Flap goes behind card when open */
        }

        /* The Card */
        .card {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 280px;
            height: 180px;
            background: var(--card-white);
            z-index: 2; /* Sits between back and front pocket */
            padding: 25px 20px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            /* Move up slowly after flap opens */
            transition: transform 1.5s ease-in-out 2s, height 1.5s ease-in-out 2s, z-index 0s 2.5s;
        }

        .container.open .card {
            transform: translateY(-350px); /* Rises up */
            height: 400px; /* Unfolds */
            z-index: 6; /* Pops to the very front at the end */
        }

        /* Content Styling */
        h2 { color: var(--envelope-dark); margin: 0 0 10px 0; font-size: 22px; }
        p { margin: 5px 0; font-size: 15px; color: #444; line-height: 1.4; }
        .btn-rsvp {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 13px;
        }

        @media (max-width: 400px) {
            .container { transform: scale(0.8); }
            .container.open { transform: scale(0.8) translateY(200px); }
        }
    </style>
</head>
<body>

    <div class="container" id="main">
        <div class="envelope-wrapper">
            <div class="flap"></div>
            
            <div class="card">
                <h2>Dinner Party</h2>
                <p>You're invited to join us for an evening of great food and company!</p>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                <p><strong>SATURDAY | APRIL 12</strong></p>
                <p>7:30 PM Onwards</p>
                <p><em>The Secret Garden Bistro</em></p>
                
                <a href="https://wa.me/1234567890" class="btn-rsvp">RSVP VIA WHATSAPP</a>
            </div>

            <div class="envelope-front"></div>
        </div>
    </div>

    <script>
        window.onload = () => {
            // Wait 2 seconds, then start the whole sequence
            setTimeout(() => {
                document.getElementById('main').classList.add('open');
            }, 500);
        };
    </script>
</body>
</html>
