<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner Invitation</title>

<style>
/* BODY + BACKGROUND */
body {
    margin: 0;
    padding-bottom: 120px; /* space for card to rise */
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 100dvh;
    background: radial-gradient(circle, #0d0d0d, #000);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* GOLD PARTICLES */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,215,0,0.12) 1px, transparent 1px);
    background-size: 30px 30px;
    animation: moveBg 30s linear infinite;
}
@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-200px,-200px); }
}

/* WRAPPER */
.wrapper {
    position: relative;
    width: 90vw;
    max-width: 320px;
    height: 400px;
}

/* ENVELOPE */
.envelope {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 160px;
    background: #8e2c2c;
    border-radius: 10px;
    overflow: visible; /* allow card to come out */
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
}

/* FLAP */
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #c0392b;
    clip-path: polygon(0 0, 100% 0, 50% 60%);
    transform-origin: top;
    transition: transform 1s ease;
    z-index: 3; /* on top initially */
}

/* CARD */
.card {
    position: absolute;
    bottom: 40px; /* inside envelope */
    left: 4%;
    width: 92%;
    min-height: 230px;
    background: linear-gradient(145deg, #fffdf6, #f2f2f2);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    transform: translateY(0);
    transition: transform 1.8s cubic-bezier(.68,-0.6,.32,1.6) 0.5s,
                box-shadow 1.8s ease;
    z-index: 1; /* start behind flap */
    transform-origin: bottom;
}

/* OPEN STATES */
.envelope.open .flap {
    transform: rotateX(180deg);
    z-index: 0; /* send behind after opening */
}
.envelope.open .card {
    transform: translateY(-220px) scale(1.02);
    box-shadow: 0 30px 60px rgba(0,0,0,0.9);
    z-index: 4; /* now on top */
}

/* CONTENT */
.content {
    opacity: 0;
    transform: translateY(15px);
    transition: all 1.5s ease;
}
.envelope.open .content {
    opacity: 1;
    transform: translateY(0);
    transition-delay: 1.5s;
}

/* TEXT */
h2 {
    font-size: 20px;
    margin: 6px 0;
}
p {
    font-size: 14px;
    margin: 4px 0;
}

/* BUTTONS */
.btn {
    display: block;
    margin: 8px auto;
    padding: 10px;
    width: 90%;
    border-radius: 25px;
    text-decoration: none;
    color: white;
    font-size: 14px;
}
.whatsapp { background: #25D366; }
.map { background: #3498db; }

/* TAP MESSAGE */
.tap-msg {
    position: absolute;
    bottom: 10px;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="envelope" id="env">
        <div class="flap"></div>
    </div>

    <div class="card" id="card">
        <div class="content">
            <h2>🍽 Dinner Invitation</h2>
            <p><b id="guestName">Dear Guest</b></p>
            <p>You are warmly invited</p>
            <p><b>Date:</b> 25 March 2026</p>
            <p><b>Time:</b> 7:30 PM</p>
            <p><b>Venue:</b> Your Home</p>

            <a class="btn whatsapp"
               href="https://wa.me/919999999999?text=I%20will%20attend">
               RSVP on WhatsApp
            </a>
            <a class="btn map"
               href="https://maps.google.com">
               View Location
            </a>
        </div>
    </div>
</div>

<div class="tap-msg">Tap anywhere for sound 🔊</div>

<audio id="sound">
    <source src="https://www.soundjay.com/paper/sounds/paper-open-01.mp3" type="audio/mp3">
</audio>

<script>
// Dynamic Name from URL
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
if(name){
    document.getElementById("guestName").innerText = "Dear " + name;
}

// Step 1: open flap & animate card
setTimeout(() => {
    document.getElementById('env').classList.add('open');
}, 800);

// Tap for sound
document.body.addEventListener('click', () => {
    document.getElementById('sound').play();
}, { once: true });
</script>

</body>
</html>
