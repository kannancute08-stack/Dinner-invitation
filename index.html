<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.90">
    <title>Royal Invitation</title>
    <style>
        :root {
            --parchment: #f4e4bc;
            --gold: #d4af37;
            --gold-dark: #a68a2d;
            --text-color: #4a3728;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Dark background behind the image */
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* --- BUDDHA BACKGROUND LAYER --- */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 90% transparency = 0.1 opacity */
            opacity: 0.1; 
            z-index: -1;
            background-image: url('https://raw.githubusercontent.com/kannancute08-stack/Dinner-invitation/main/bg.png');
            background-size: cover;
            background-position: center;
        }

        .scroll-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 380px;
        }

        /* The Golden Rods */
        .roller {
            width: 110%;
            height: 20px;
            background: linear-gradient(to bottom, var(--gold-dark), var(--gold), var(--gold-dark));
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
            position: relative;
        }

        /* The Parchment */
        .parchment {
            width: 100%;
            height: 0px; /* Starts closed */
            background-color: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/papyros.png');
            overflow: hidden;
            transition: height 2s ease-in-out 0.5s; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Content inside the scroll */
        .content {
            padding: 30px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s ease 2s, transform 1.5s ease 2s;
            color: var(--text-color);
            width: 100%;
            box-sizing: border-box;
        }

        /* ANIMATION TRIGGER */
        .scroll-container.open .parchment {
            height: 480px; 
        }

        .scroll-container.open .content {
            opacity: 1;
            transform: translateY(0);
        }

        /* Typography */
        h1 { 
            font-size: 22px; 
            margin-bottom: 15px;
            color: #000;
        }
        p { font-size: 16px; line-height: 1.4; margin: 8px 0; }
        .date { font-weight: bold; color: #8b4513; font-size: 18px; }
        
        .btn-rsvp {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: var(--text-color);
            color: var(--parchment);
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 13px;
            transition: background 0.3s;
        }

        /* Decorative ends for the rollers */
        .roller::before, .roller::after {
            content: "";
            position: absolute;
            top: -5px;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, var(--gold), var(--gold-dark));
            border-radius: 50%;
            border: 2px solid #555;
        }
        .roller::before { left: -15px; }
        .roller::after { right: -15px; }

    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="scroll-container" id="scroll">
        <div class="roller"></div>

        <div class="parchment">
            <div class="content">
                <p>Request the pleasure of the company of</p>
                <h1 style="font-weight: bold;">MR ANIKET GOVIND MANDAVGANE</h1>
                <p class="date">Thursday, Mar 12th</p>
                <p>6:45 PM.</p>
                <p><b>Dress: </b>Formals</p>
                <div style="margin-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px;">
                    <p><em><B>RSVP: </B>ADC to Commandant</em></p>
                    <p><em>(Regrets only)</em></p>
                </div>
                <a href="https://wa.me/97577423330" class="btn-rsvp">Accept Invitation</a>
            </div>
        </div>

        <div class="roller"></div>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('scroll').classList.add('open');
            }, 800);
        };
    </script>
</body>
</html>
