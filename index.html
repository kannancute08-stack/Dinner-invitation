<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.90">
    <title>Royal Invitation</title>
    <style>
        :root {
            --parchment: #f4e4bc;
            --gold: #d4af37;
            --gold-dark: #a68a2d;
            --text-color: #4a3728;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c2c2c; /* Dark background makes gold pop */
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .scroll-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 350px;
        }

        /* The Golden Rods */
        .roller {
            width: 110%;
            height: 20px;
            background: linear-gradient(to bottom, var(--gold-dark), var(--gold), var(--gold-dark));
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
            position: relative;
        }

        /* The Parchment */
        .parchment {
            width: 100%;
            height: 0px; /* Starts closed */
            background-color: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/papyros.png'); /* Subtle paper texture */
            overflow: hidden;
            transition: height 2s ease-in-out 1s; /* Unrolls after 1s */
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Content inside the scroll */
        .content {
            padding: 30px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s ease 2.5s, transform 1.5s ease 2.5s; /* Fades in last */
            color: var(--text-color);
            width: 100%;
            box-sizing: border-box;
        }

        /* ANIMATION TRIGGER */
        .scroll-container.open .parchment {
            height: 450px; /* Height of the unrolled scroll */
        }

        .scroll-container.open .content {
            opacity: 1;
            transform: translateY(0);
        }

        /* Typography */
        h1 { 
            font-size: 26px; 
            border-bottom: 2px solid var(--gold); 
            display: inline-block; 
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        p { font-size: 18px; line-height: 1.6; margin: 10px 0; }
        .date { font-weight: bold; color: #8b4513; }
        
        .btn-rsvp {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background-color: var(--text-color);
            color: var(--parchment);
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;
        }

        /* Decorative ends for the rollers */
        .roller::before, .roller::after {
            content: "";
            position: absolute;
            top: -5px;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, var(--gold), var(--gold-dark));
            border-radius: 50%;
            border: 2px solid #555;
        }
        .roller::before { left: -15px; }
        .roller::after { right: -15px; }

    </style>
</head>
<body>

    <div class="scroll-container" id="scroll">
        <div class="roller"></div>

        <div class="parchment">
            <div class="content">
                <h1>Invitation</h1>
                <p>By Royal Decree, you are invited to a grand</p>
                <p style="font-size: 24px; font-weight: bold;">DINNER FEAST</p>
                <p class="date">Saturday, April 12th</p>
                <p>7:30 PM Onwards</p>
                <p><em>The Secret Garden Bistro</em></p>
                
                <a href="https://wa.me/1234567890" class="btn-rsvp">Accept Invitation</a>
            </div>
        </div>

        <div class="roller"></div>
    </div>

    <script>
        window.onload = () => {
            // Sequence:
            // 0s: Page loads with rods together
            // 1s: Scroll starts to unroll
            // 2.5s: Text fades in
            setTimeout(() => {
                document.getElementById('scroll').classList.add('open');
            }, 1000);
        };
    </script>
</body>
</html>
