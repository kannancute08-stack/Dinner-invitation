<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Invitation</title>
    <style>
        :root {
            --bg-color: #fce4ec;
            --envelope-color: #d44d44;
            --envelope-dark: #b13b33;
            --card-white: #ffffff;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* This container prevents the card from peeking out the bottom */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-dark);
            cursor: pointer;
            /* CRITICAL FIX: hidden overflow hides the bottom of the card */
            overflow: visible; 
        }

        /* The Front of the Envelope (Triangles) */
        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 3;
        }

        .envelope-front::before {
            content: "";
            position: absolute;
            bottom: 0;
            border-top: 100px solid transparent;
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid var(--envelope-color);
            border-left: 150px solid var(--envelope-color);
        }

        /* The Top Flap */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--envelope-dark);
            transform-origin: top;
            z-index: 4;
            transition: transform 0.5s ease;
        }

        /* The Card - Hidden inside initially */
        .card {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 280px;
            height: 180px; /* Shortened initial height */
            background: var(--card-white);
            z-index: 1; 
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            transition: transform 0.8s ease, height 0.8s ease, z-index 0s 0.4s;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            visibility: hidden; /* Added to ensure it's invisible until the move starts */
        }

        /* OPEN STATE */
        .open .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .open .card {
            visibility: visible;
            transform: translateY(-190px);
            z-index: 5;
            height: 330px; /* Expands to full size */
        }

        /* Content Styling */
        h2 { color: var(--envelope-dark); margin: 0 0 10px 0; font-size: 22px; }
        p { margin: 5px 0; font-size: 14px; color: #444; line-height: 1.4; }
        
        .btn-rsvp {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 12px;
            font-family: sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @media (max-width: 400px) {
            .envelope-wrapper { transform: scale(0.9); top: 50px; }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="invite" onclick="this.classList.toggle('open')">
        <div class="flap"></div>
        
        <div class="card">
            <h2>Dinner Party</h2>
            <p>You're invited to join us for an evening of great food and company!</p>
            <div style="border-top: 1px solid #eee; margin: 10px 0;"></div>
            <p><strong>SATURDAY | APRIL 12</strong></p>
            <p>7:30 PM Onwards</p>
            <p><em>The Secret Garden Bistro</em></p>
            
            <a href="https://wa.me/1234567890?text=I'll%20be%20there!" class="btn-rsvp">
                RSVP VIA WHATSAPP
            </a>
        </div>

        <div class="envelope-front"></div>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('invite').classList.add('open');
            }, 1000);
        };
    </script>
</body>
</html>
