<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Invitation</title>
    <style>
        :root {
            --bg-color: #fce4ec;
            --envelope-color: #d44d44;
            --envelope-dark: #b13b33;
            --card-white: #ffffff;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            margin-top: 150px; /* Gives room for card to pop out upwards */
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-dark);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* The Card */
        .card {
            position: absolute;
            top: 5px;
            left: 10px;
            width: 280px;
            height: 180px;
            background: var(--card-white);
            z-index: 1; /* Initially inside */
            padding: 25px 20px;
            box-sizing: border-box;
            text-align: center;
            transition: transform 1s ease-in-out, z-index 0s 0.5s, height 0.6s 0.8s;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border: 1px solid #eee;
            border-radius: 4px;
        }

        /* Envelope Front - Two triangles meeting */
        .envelope-wrapper::before {
            content: "";
            position: absolute;
            bottom: 0;
            z-index: 3;
            border-top: 100px solid transparent;
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid var(--envelope-color);
            border-left: 150px solid var(--envelope-color);
        }

        /* Top Flap */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--envelope-dark);
            transform-origin: top;
            z-index: 4;
            transition: transform 0.6s ease;
        }

        /* OPEN STATE ANIMATIONS */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .card {
            /* 1. Card moves WAY UP to clear the envelope */
            /* 2. Z-index changes mid-way (via the transition delay) */
            /* 3. Card then settles slightly down and expands */
            transform: translateY(-220px); 
            z-index: 5;
            height: 350px;
        }

        h2 { color: var(--envelope-dark); margin: 0 0 15px 0; font-size: 26px; border-bottom: 1px solid #fce4ec; padding-bottom: 10px; }
        p { margin: 10px 0; font-size: 15px; color: #444; line-height: 1.4; }
        
        .btn-rsvp {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            font-family: sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @media (max-width: 400px) {
            .container { transform: scale(0.85); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="envelope-wrapper" id="invite" onclick="this.classList.toggle('open')">
            <div class="flap"></div>
            <div class="card">
                <h2>Dinner Invite</h2>
                <p>We'd love for you to join us for a delightful evening of food and conversation.</p>
                <p><strong>SATURDAY, APRIL 12</strong></p>
                <p>7:30 PM Onwards</p>
                <p><em>The Secret Garden Bistro</em></p>
                
                <a href="https://wa.me/YOURNUMBER?text=Hi!%20I'd%20love%20to%20attend%20the%20dinner." class="btn-rsvp">
                    RSVP VIA WHATSAPP
                </a>
            </div>
        </div>
    </div>

    <script>
        // Trigger animation after page loads
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('invite').classList.add('open');
            }, 1000);
        };
    </script>
</body>
</html>
