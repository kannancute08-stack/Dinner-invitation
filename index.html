<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dinner Invitation</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #1a1a1a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* Soft moving glow */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,215,0,0.08) 1px, transparent 1px);
    background-size: 35px 35px;
    animation: moveBg 25s linear infinite;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-150px,-150px); }
}

/* Envelope */
.envelope {
    position: relative;
    width: 90vw;
    max-width: 320px;
    height: 300px;
    background: #8e2c2c;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(255,215,0,0.25);
}

/* Flap */
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #c0392b;
    clip-path: polygon(0 0, 100% 0, 50% 60%);
    transform-origin: top;
    transition: transform 1.4s ease;
}

/* Card */
.card {
    position: absolute;
    width: 92%;
    height: auto;
    min-height: 200px;
    background: linear-gradient(145deg, #fff, #f5f5f5);
    top: 10px;
    left: 4%;
    border-radius: 14px;
    padding: 18px;
    box-sizing: border-box;
    transform: translateY(140%);
    transition: transform 1.6s ease;
    text-align: center;
}

/* Open animation */
.envelope.open .flap {
    transform: rotateX(180deg);
}

.envelope.open .card {
    transform: translateY(-40px);
}

/* Fade content */
.content {
    opacity: 0;
    transition: opacity 1.2s ease;
}

.envelope.open .content {
    opacity: 1;
    transition-delay: 1.3s;
}

/* Typography (mobile optimized) */
h2 {
    margin: 6px 0;
    font-size: 20px;
    color: #222;
}

p {
    margin: 4px 0;
    font-size: 14px;
    color: #444;
}

/* Buttons */
.btn {
    display: block;
    margin: 8px auto;
    padding: 10px;
    width: 90%;
    border-radius: 25px;
    text-decoration: none;
    font-size: 14px;
    color: white;
}

.whatsapp {
    background: #25D366;
}

.map {
    background: #3498db;
}

</style>
</head>

<body>

<div class="envelope" id="env">
    <div class="flap"></div>

    <div class="card">
        <div class="content">
            <h2>🍽 Dinner Invitation</h2>
            <p><b>Dear Kannan</b></p>

            <p>You are warmly invited</p>

            <p><b>Date:</b> 25 March 2026</p>
            <p><b>Time:</b> 7:30 PM</p>
            <p><b>Venue:</b> Your Home</p>

            <p>Join us for a special evening ✨</p>

            <a class="btn whatsapp"
            href="https://wa.me/919999999999?text=I%20will%20attend">
            RSVP on WhatsApp
            </a>

            <a class="btn map"
            href="https://maps.google.com">
            View Location
            </a>
        </div>
    </div>
</div>

<!-- Music -->
<audio id="music">
    <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mp3">
</audio>

<script>
// Auto open
setTimeout(() => {
    document.getElementById('env').classList.add('open');
}, 1200);

// Enable music after first tap (mobile restriction)
document.body.addEventListener('click', () => {
    document.getElementById('music').play();
}, { once: true });

</script>

</body>
</html>
