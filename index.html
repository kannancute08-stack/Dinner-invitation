<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Invitation</title>
    <style>
        :root {
            --bg-color: #fce4ec;
            --envelope-color: #d44d44;
            --envelope-dark: #b13b33;
            --card-white: #ffffff;
            --gold: #d4af37;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            top: 50px; /* Moves it down so the card has room to pop up */
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-dark);
            cursor: pointer;
        }

        /* The Card - Starts Hidden */
        .card {
            position: absolute;
            top: 5px;
            left: 10px;
            width: 280px;
            height: 180px;
            background: var(--card-white);
            z-index: 1; /* Behind the front flaps initially */
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            transition: transform 0.8s ease, z-index 0s 0.4s;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        /* Front Flaps of Envelope */
        .envelope-wrapper::before {
            content: "";
            position: absolute;
            z-index: 3;
            border-top: 100px solid transparent;
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid var(--envelope-color);
            border-left: 150px solid var(--envelope-color);
        }

        /* Top Flap */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--envelope-dark);
            transform-origin: top;
            z-index: 4;
            transition: transform 0.5s ease;
        }

        /* OPEN STATE ANIMATIONS */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .card {
            transform: translateY(-180px); /* Moves up higher */
            z-index: 5; /* Brings it to the very front */
            height: 320px; /* Expands to show content */
        }

        /* Content Styling */
        h2 { color: var(--envelope-dark); margin-top: 0; font-size: 24px; }
        p { margin: 8px 0; font-size: 14px; color: #444; }
        
        .btn-rsvp {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 13px;
            font-family: sans-serif;
        }

        @media (max-width: 400px) {
            .container { transform: scale(0.9); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="envelope-wrapper" id="invite" onclick="this.classList.toggle('open')">
            <div class="flap"></div>
            <div class="card">
                <h2>Dinner Invitation</h2>
                <p>You're invited to join us for an evening of great food and company!</p>
                <div style="border-top: 1px solid #ddd; margin: 10px 0;"></div>
                <p><strong>SATURDAY | APRIL 12</strong></p>
                <p>Starts at 7:30 PM</p>
                <p><em>The Secret Garden Bistro</em></p>
                
                <a href="https://wa.me/1234567890?text=I'm%20coming%20to%20dinner!" class="btn-rsvp">
                    RSVP ON WHATSAPP
                </a>
            </div>
        </div>
    </div>

    <script>
        // Automatic opening sequence
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('invite').classList.add('open');
            }, 1200);
        };
    </script>
</body>
</html>
