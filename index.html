<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited!</title>
    <style>
        :root {
            --primary-color: #f5f5f5;
            --envelope-color: #d44d44;
            --envelope-dark: #b13b33;
            --card-color: #ffffff;
            --text-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fce4ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
        }

        /* Envelope Body */
        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .envelope::before {
            content: "";
            position: absolute;
            z-index: 2;
            border-top: 110px solid transparent;
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid var(--envelope-color);
            border-left: 150px solid var(--envelope-color);
        }

        /* The Flap */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--envelope-dark);
            transform-origin: top;
            z-index: 3;
            transition: transform 0.6s 0.4s ease;
        }

        /* The Invite Card */
        .card {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 280px;
            height: 180px;
            background: var(--card-color);
            z-index: 1;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            transition: transform 0.8s 1s ease, height 0.8s 1s ease;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            border-radius: 5px;
        }

        .card h2 {
            font-size: 22px;
            color: var(--envelope-color);
            margin-bottom: 10px;
        }

        .card p {
            font-size: 14px;
            margin: 5px 0;
            color: var(--text-color);
        }

        /* Animation States */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .card {
            transform: translateY(-120px);
            height: 260px; /* Expands when it comes out */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Mobile Adjustments */
        @media (max-width: 400px) {
            .envelope { width: 260px; height: 170px; }
            .flap { border-left-width: 130px; border-right-width: 130px; border-top-width: 95px; }
            .card { width: 240px; height: 150px; }
            .envelope-wrapper.open .card { transform: translateY(-130px); height: 280px; }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelopeWrapper" onclick="this.classList.toggle('open')">
        <div class="flap"></div>
        <div class="envelope"></div>
        <div class="card">
            <h2>Dinner Party</h2>
            <p>You are cordially invited to a special evening of food and laughter.</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            <p><strong>DATE:</strong> Saturday, April 12th</p>
            <p><strong>TIME:</strong> 7:30 PM</p>
            <p><strong>LOCATION:</strong> The Secret Garden Bistro</p>
            <p style="margin-top: 15px; font-style: italic; font-size: 12px;">Tap to close</p>
        </div>
    </div>

    <script>
        // Auto-open after a short delay for that "wow" effect
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('envelopeWrapper').classList.add('open');
            }, 1000);
        };
    </script>
</body>
</html>
