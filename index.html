<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.90">
    <title>Dinner Invitation | Flag Staff House</title>
    <style>
        :root {
            --parchment: #f4e4bc;
            --gold: #d4af37;
            --gold-dark: #a68a2d;
            --text-color: #4a3728;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; 
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* --- BUDDHA BACKGROUND LAYER (90% Transparent) --- */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1; 
            z-index: -1;
            background-image: url('https://raw.githubusercontent.com/kannancute08-stack/Dinner-invitation/main/bg.png');
            background-size: cover;
            background-position: center;
        }

        .scroll-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 400px;
        }

        /* Golden Rods */
        .roller {
            width: 110%;
            height: 20px;
            background: linear-gradient(to bottom, var(--gold-dark), var(--gold), var(--gold-dark));
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
            position: relative;
        }

        /* The Parchment */
        .parchment {
            width: 100%;
            height: 0px; 
            background-color: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/papyros.png');
            overflow: hidden;
            transition: height 2s ease-in-out 0.5s; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Content Sections */
        .content {
            padding: 25px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s ease 2s, transform 1.5s ease 2s;
            color: var(--text-color);
            width: 100%;
            box-sizing: border-box;
        }

        .scroll-container.open .parchment {
            height: 550px; 
        }

        .scroll-container.open .content {
            opacity: 1;
            transform: translateY(0);
        }

        /* Logo & Host Header */
        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 10px;
        }

        .logo { width: 60px; height: auto; }
        
        .host-name {
            font-size: 16px;
            font-weight: bold;
            text-align: right;
            font-style: italic;
        }

        /* Guest Name */
        h1 { 
            font-size: 20px; 
            margin: 15px 0;
            color: #000;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gold);
            display: inline-block;
        }

        p { font-size: 15px; line-height: 1.4; margin: 5px 0; }
        .date { font-weight: bold; color: #8b4513; font-size: 17px; margin-top: 10px; }
        
        .btn-rsvp {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: var(--text-color);
            color: var(--parchment);
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
        }

        .btn-rsvp:hover { background-color: #000; }

        /* Roller Ends */
        .roller::before, .roller::after {
            content: "";
            position: absolute;
            top: -5px;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, var(--gold), var(--gold-dark));
            border-radius: 50%;
            border: 2px solid #555;
        }
        .roller::before { left: -15px; }
        .roller::after { right: -15px; }

    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="scroll-container" id="scroll">
        <div class="roller"></div>

        <div class="parchment">
            <div class="content">
                
               <!--
                <div class="header-box">
                    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/5/53/Indian_Military_Training_Team_Bhutan_Logo.png/220px-Indian_Military_Training_Team_Bhutan_Logo.png" class="logo" alt="IMTRAT Logo">
                    <div class="host-name">Maj Gen & Mrs Mohit Seth</div>
                </div> 
                -->

                <p>Request the pleasure of the company of</p>
                
                <h1 id="guestName" style="font-weight: bold;">GUEST NAME</h1>
                
                <p>to <b>Dinner</b> at <b>Flag Staff House</b></p>
                
                <p class="date">Thursday, Mar 12, 2026</p>
                <p>at <b>6:45 P.M.</b></p>
                
                <p style="margin-top: 15px;"><b>Dress: </b>Formals</p>
                
                <div style="margin-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px; font-size: 13px;">
                    <p><b>RSVP: </b>ADC to Commandant</p>
                    <p>(Regrets only) | <b>Mob: </b>+91-8874915524</p>
                </div>
                
                <a href="https://wa.me/97577423330" class="btn-rsvp">Accept Invitation</a>
            </div>
        </div>

        <div class="roller"></div>
    </div>

    <script>
        window.onload = () => {
            // 1. Get the name from the URL (?name=Mr. Smith)
            const urlParams = new URLSearchParams(window.location.search);
            const guestName = urlParams.get('name');

            // 2. If a name exists, update the text on the page
            if (guestName) {
                document.getElementById('guestName').innerText = decodeURIComponent(guestName);
            }

            // 3. Trigger the unrolling animation
            setTimeout(() => {
                document.getElementById('scroll').classList.add('open');
            }, 800);
        };
    </script>
</body>
</html>
